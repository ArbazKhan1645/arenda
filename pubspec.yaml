name: arenda
description: "Arenda APP built with Flutter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4
  # sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # =========================
  # 🧠 State Management
  # =========================
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # =========================
  # 🧭 Navigation / Routing
  # =========================
  go_router: ^17.2.2

  # =========================
  # 🎨 UI / Styling / Animations
  # =========================

  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1
  shimmer: ^3.0.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # =========================
  # 🖼️ Media / Images / Viewers
  # =========================
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  video_player: ^2.11.1
  chewie: ^1.13.1

  # =========================
  # 🌐 Backend / APIs / Database
  # =========================
  supabase_flutter: ^2.12.4

  # =========================
  # 🔐 Storage / Security
  # =========================
  flutter_secure_storage: ^10.0.0

  # =========================
  # 📡 Device / Connectivity
  # =========================
  connectivity_plus: ^7.1.1
  device_info_plus: ^12.4.0

  # =========================
  # 📂 File Handling / Sharing
  # =========================
  file_picker: ^11.0.2
  share_plus: ^12.0.2

  # =========================
  # 🛠️ Utilities / Helpers
  # =========================
  intl: ^0.20.2
  uuid: ^4.5.3
  flutter_dotenv: ^6.0.0
  http: ^1.6.0
  audioplayers: ^6.6.0
  mailer: ^7.1.0

  # =========================
  # 🍎 Icons
  # =========================
  cupertino_icons: ^1.0.9
  font_awesome_flutter: ^11.0.0
  phosphor_flutter: ^2.1.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  flutter_native_splash: ^2.4.7



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.0+1
  build_runner: ^2.13.1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/audios/
    - assets/images/onboarding/
    - assets/images/app_logo/

  fonts:
  - family: JosefinSans
    fonts:
      - asset: assets/fonts/JosefinSans-Thin.ttf
        weight: 100
      - asset: assets/fonts/JosefinSans-ThinItalic.ttf
        weight: 100
        style: italic

      - asset: assets/fonts/JosefinSans-ExtraLight.ttf
        weight: 200
      - asset: assets/fonts/JosefinSans-ExtraLightItalic.ttf
        weight: 200
        style: italic

      - asset: assets/fonts/JosefinSans-Light.ttf
        weight: 300
      - asset: assets/fonts/JosefinSans-LightItalic.ttf
        weight: 300
        style: italic

      - asset: assets/fonts/JosefinSans-Regular.ttf
        weight: 400
      - asset: assets/fonts/JosefinSans-Italic.ttf
        weight: 400
        style: italic

      - asset: assets/fonts/JosefinSans-Medium.ttf
        weight: 500
      - asset: assets/fonts/JosefinSans-MediumItalic.ttf
        weight: 500
        style: italic

      - asset: assets/fonts/JosefinSans-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/JosefinSans-SemiBoldItalic.ttf
        weight: 600
        style: italic

      - asset: assets/fonts/JosefinSans-Bold.ttf
        weight: 700
      - asset: assets/fonts/JosefinSans-BoldItalic.ttf
        weight: 700
        style: italic