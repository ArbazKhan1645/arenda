name: arenda
description: "Arenda APP built with Flutter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4
  # sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # =========================
  # 🧠 State Management
  # =========================
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # =========================
  # 🧭 Navigation / Routing
  # =========================
  go_router: ^17.2.0

  # =========================
  # 🎨 UI / Styling / Animations
  # =========================

  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1
  shimmer: ^3.0.0

  # =========================
  # 🖼️ Media / Images / Viewers
  # =========================
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0

  # =========================
  # 🌐 Backend / APIs / Database
  # =========================
  supabase_flutter: ^2.12.2

  # =========================
  # 🔐 Storage / Security
  # =========================
  flutter_secure_storage: ^10.0.0

  # =========================
  # 📡 Device / Connectivity
  # =========================
  connectivity_plus: ^7.1.1
  device_info_plus: ^12.4.0

  # =========================
  # 📂 File Handling / Sharing
  # =========================
  file_picker: ^11.0.2
  share_plus: ^12.0.2

  # =========================
  # 🛠️ Utilities / Helpers
  # =========================
  intl: ^0.20.2
  uuid: ^4.5.3
  flutter_dotenv: ^6.0.0
  http: ^1.6.0
  audioplayers: ^6.6.0
  mailer: ^6.2.0

  # =========================
  # 🍎 Icons
  # =========================
  cupertino_icons: ^1.0.9
  font_awesome_flutter: ^10.8.0
  phosphor_flutter: ^2.1.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.0+1
  build_runner: ^2.13.1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/audios/
    - assets/images/onboarding/


  fonts:
    - family: Montserrat
      fonts:
        - asset: assets\fonts\montserrat\Montserrat-Black.ttf
        - asset: assets\fonts\montserrat\Montserrat-BlackItalic.ttf
        - asset: assets\fonts\montserrat\Montserrat-Bold.ttf
        - asset: assets\fonts\montserrat\Montserrat-ExtraBold.ttf
        - asset: assets\fonts\montserrat\Montserrat-ExtraBoldItalic.ttf
        - asset: assets\fonts\montserrat\Montserrat-ExtraLight.ttf
        - asset: assets\fonts\montserrat\Montserrat-ExtraLightItalic.ttf
        - asset: assets\fonts\montserrat\Montserrat-SemiBold.ttf
          style: italic
    - family: NunitoSans
      fonts:
        - asset: assets\fonts\nunitoSans\NunitoSans_7pt-Medium.ttf
        - asset: assets\fonts\nunitoSans\NunitoSans_10pt-Bold.ttf
        - asset: assets\fonts\nunitoSans\NunitoSans_10pt-ExtraLight.ttf
        - asset: assets\fonts\nunitoSans\NunitoSans_10pt-Light.ttf
        - asset: assets\fonts\nunitoSans\NunitoSans_10pt-Regular.ttf
        - asset: assets\fonts\nunitoSans\NunitoSans_10pt-SemiBold.ttf
          # style: static
    - family: inter
      fonts:
        - asset: assets\fonts\inter\Inter-Black.ttf
        - asset: assets\fonts\inter\Inter-Bold.ttf
        - asset: assets\fonts\inter\Inter-ExtraBold.ttf
        - asset: assets\fonts\inter\Inter-Medium.ttf
        - asset: assets\fonts\inter\Inter-SemiBold.ttf